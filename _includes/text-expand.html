<script>
    
    var elements = document.querySelectorAll('p');
    Array.prototype.forEach.call(elements, function(el, i){
        if(el.innerHTML=='[expand]') {
            var parentcontent = el.parentNode.innerHTML.replace('<p>[expand]</p>','<details><summary>Click to expand</summary><pre style="white-space: pre-wrap">').replace('<p>[/expand]</p>','</pre></details>');
            el.parentNode.innerHTML = parentcontent;
        }
    });
</script>
